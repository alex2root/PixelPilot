name: Build
on:
  push:
    branches:
      - 'master'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    environment: ANDROID_KEYSTORE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > pixelpilot.jks
          if [ ! -s pixelpilot.jks ]; then
            echo "ERROR: secrets.ANDROID_KEYSTORE is empty."
            exit 1
          fi

      - name: Build Unsigned APK
        run: |
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -n 1)
          $BUILD_TOOLS_DIR/apksigner sign \
            --ks pixelpilot.jks \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias pixelpilot \
            --key-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --out PixelPilot.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk || \
          $BUILD_TOOLS_DIR/apksigner sign \
            --ks pixelpilot.jks \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias pixelpilot \
            --key-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --out PixelPilot.apk \
            app/build/outputs/apk/release/app-release.apk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          files: PixelPilot.apk
